<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Warm paper background -->
  <rect width="128" height="128" rx="28" fill="#f5f1e8"/>

  <!-- Subtle grain -->
  <g fill="#1a1a1a" opacity="0.04">
    <circle cx="20" cy="30" r="0.8"/>
    <circle cx="40" cy="18" r="0.8"/>
    <circle cx="70" cy="25" r="0.8"/>
    <circle cx="100" cy="15" r="0.8"/>
    <circle cx="15" cy="60" r="0.8"/>
    <circle cx="110" cy="55" r="0.8"/>
    <circle cx="25" cy="95" r="0.8"/>
    <circle cx="55" cy="108" r="0.8"/>
    <circle cx="90" cy="100" r="0.8"/>
    <circle cx="115" cy="90" r="0.8"/>
  </g>

  <!-- Coral vermillion seal ring -->
  <circle cx="64" cy="64" r="44" fill="none" stroke="#e85d5d" stroke-width="3.5" opacity="0.95"/>
  <!-- Seal imperfection: tiny gap at top-left -->
  <path d="M 28 42 A 44 44 0 0 1 38 30" fill="none" stroke="#f5f1e8" stroke-width="5"/>

  <!-- Stacked monogram: H above, T below, centered -->
  <g fill="#1a1a1a">
    <!-- Letter H (top half) -->
    <!-- left vertical stroke -->
    <rect x="42" y="30" width="9" height="36" rx="0.5"/>
    <!-- right vertical stroke -->
    <rect x="77" y="30" width="9" height="36" rx="0.5"/>
    <!-- horizontal crossbar -->
    <rect x="51" y="44" width="26" height="8" rx="0.5"/>
    <!-- serifs on H: top-left -->
    <rect x="38" y="30" width="17" height="4" rx="0.5"/>
    <!-- serifs on H: top-right -->
    <rect x="73" y="30" width="17" height="4" rx="0.5"/>
    <!-- serifs on H: bottom-left -->
    <rect x="38" y="62" width="17" height="4" rx="0.5"/>
    <!-- serifs on H: bottom-right -->
    <rect x="73" y="62" width="17" height="4" rx="0.5"/>
  </g>

  <!-- Coral hairline separator between H and T -->
  <line x1="50" y1="72" x2="78" y2="72" stroke="#e85d5d" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>

  <g fill="#1a1a1a">
    <!-- Letter T (bottom half) -->
    <!-- horizontal top stroke -->
    <rect x="36" y="78" width="56" height="9" rx="0.5"/>
    <!-- vertical stem -->
    <rect x="59.5" y="87" width="9" height="15" rx="0.5"/>
    <!-- serifs on T: top-left -->
    <rect x="34" y="78" width="6" height="4" rx="0.5"/>
    <!-- serifs on T: top-right -->
    <rect x="88" y="78" width="6" height="4" rx="0.5"/>
    <!-- serifs on T: bottom (foot) -->
    <rect x="54" y="99" width="20" height="4" rx="0.5"/>
  </g>
</svg>
